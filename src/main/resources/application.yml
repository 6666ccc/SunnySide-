server:
  port: 8080

# false：挂载住院工具；true：仅测 RAG 时不挂工具
app:
  ai:
    rag-test-mode: false

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sunnyside?serverTimezone=GMT%2B8&characterEncoding=utf8&useSSL=false
    username: root
    password: 123456789
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-max
    vectorstore:
      qdrant:
        host: 47.100.11.196
        port: 6334
        collection-name: sunnyside
        use-tls: false #是否使用TLS
        initialize-schema: true #是否初始化schema

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.project.pojo
  configuration:
    map-underscore-to-camel-case: true
logging:
  level:
    com.example.project.mapper: DEBUG
