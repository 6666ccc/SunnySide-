server:
  port: 8080
  


spring:
  #开启本地yml文件的配置覆盖全局yml文件的配置
  profiles:
      active: local
  datasource:
    url: jdbc:mysql://localhost:3306/sunnyside?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}       # 默认 root，生产环境请配置环境变量 DB_USERNAME
    password: ${DB_PASSWORD:123456789}  # 默认 123456789，生产环境请配置环境变量 DB_PASSWORD
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 60s

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen3.5-plus
          temperature: 0.7
          multi-model: true  

    # 2. Qdrant 向量数据库配置
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST}
        port: 6334      # REST API 端口
        collection-name: Sunny_Side_Qdrant # 集合名称
        initialize-schema: true

logging:
  level:
    "[org.springframework.ai]": DEBUG
    "[io.qdrant.client]": INFO

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml

app:
  ai:
    workflow:
      enabled: ${APP_AI_WORKFLOW_ENABLED:false}
  auth:
    captcha:
      prefix: ${APP_AUTH_CAPTCHA_PREFIX:auth:family:captcha:}
      ttl-seconds: ${APP_AUTH_CAPTCHA_TTL_SECONDS:120}
      width: ${APP_AUTH_CAPTCHA_WIDTH:160}
      height: ${APP_AUTH_CAPTCHA_HEIGHT:60}
      code-count: ${APP_AUTH_CAPTCHA_CODE_COUNT:4}
      interfere-count: ${APP_AUTH_CAPTCHA_INTERFERE_COUNT:20}
    jwt:
      secret: ${APP_JWT_SECRET:sunnyside-dev-jwt-secret}
      issuer: ${APP_JWT_ISSUER:sunnyside}
      expire-hours: ${APP_JWT_EXPIRE_HOURS:24}
